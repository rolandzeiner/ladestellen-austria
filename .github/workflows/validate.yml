name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  no-dev-fixture:
    # _dev_fixture.py is a gitignored, dev-only hook in the coordinator
    # (see contextlib.suppress(ImportError) site). It must never enter
    # the repo — gitignore covers accidental staging, this guards against
    # `git add -f` or the rule being deleted. Loud, fast, first job.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify _dev_fixture.py is not committed
        run: |
          if [ -f custom_components/ladestellen_austria/_dev_fixture.py ]; then
            echo "::error::custom_components/ladestellen_austria/_dev_fixture.py must never be committed (dev-only hook)."
            exit 1
          fi

  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hacs/action@main
        with:
          category: integration

  validate-hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: home-assistant/actions/hassfest@master

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          # Pinned to 3.13 — HA core's transitive deps (pydantic-core /
          # orjson / Pillow) still ship pyo3 0.24 which refuses to build
          # against Python ≥3.14, and these deps don't enable pyo3's
          # `abi3` feature so PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1 is
          # a no-op for them. Tried 3.14 (CI failure verified
          # 2026-05-01) and rolled back; bump again once
          # `pip show pydantic_core orjson Pillow` shows pyo3 0.25+ on
          # a fresh HA release.
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -r requirements_test.txt
      - name: Run Linter (Ruff)
        run: |
          pip install ruff
          ruff check .
      - name: Run mypy (strict)
        run: mypy --strict --ignore-missing-imports custom_components/ladestellen_austria
      - name: Run tests
        run: pytest tests/ -v

  validate-card:
    # Rebuilds the Lovelace card bundle from src/ and verifies the output
    # is valid JS. Catches TS errors and missing deps before they reach the
    # served www/ladestellen-austria-card.js.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - name: Install card deps
        run: npm ci
      - name: Audit production deps
        run: npm audit --omit=dev --audit-level=high
      - name: Type-check (strict)
        # Rollup's @rollup/plugin-typescript is more permissive than tsc
        # in strict mode. Run tsc separately so TS regressions surface in
        # CI instead of slipping into the bundle.
        run: npx tsc --noEmit
      - name: Build card bundle
        run: npm run build
      - name: Syntax-check bundle
        run: node -c custom_components/ladestellen_austria/www/ladestellen-austria-card.js
