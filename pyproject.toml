# Config home for ruff, mypy, and coverage. Pytest config stays in pytest.ini.
# Pre-commit and CI may still pass equivalent CLI flags — they are now
# redundant with this file but harmless. Trim them as confidence grows.

[tool.ruff]
# Aligned with the CI Python pin (.github/workflows/validate.yml). HA
# core targets 3.13.x; bumping this is a breaking change for downstream
# contributors building on older interpreters — keep it explicit.
target-version = "py313"
line-length = 88

[tool.mypy]
strict = true
ignore_missing_imports = true
files = ["custom_components/ladestellen_austria"]

[tool.coverage.run]
source = ["custom_components/ladestellen_austria"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "\\.\\.\\.",
]
show_missing = true
skip_empty = true
